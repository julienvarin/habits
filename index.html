<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#f5f5f7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="Habits" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
  <title>Habits</title>
</head>
<body>
  <div id="app">
    <header class="topbar" id="topbar">
      <div class="topbar-row1">
        <h1 id="page-title">Today</h1>
        <span id="date-label"></span>
      </div>
      <div id="progress-area"></div>
    </header>

    <section id="view-today" class="view active">
      <div id="dash-root"></div>
      <div id="habits-root"></div>
    </section>
    <section id="view-history" class="view"></section>
    <section id="view-stats"   class="view"></section>

    <button id="fab" aria-label="Add habit">+</button>

    <nav class="tabs" role="tablist" aria-label="Views">
      <button class="tab active" data-view="today"   role="tab" aria-selected="true">
        <span class="tab-icon">✓</span>Today
      </button>
      <button class="tab" data-view="history" role="tab" aria-selected="false">
        <span class="tab-icon">▦</span>History
      </button>
      <button class="tab" data-view="stats"   role="tab" aria-selected="false">
        <span class="tab-icon">↗</span>Stats
      </button>
    </nav>

    <div id="modal-root" role="dialog" aria-modal="true"></div>
    <div id="toast"      role="status" aria-live="polite"></div>
  </div>

  <script src="config.js"></script>
  <script src="supabase.js"></script>
  <script src="dashboard.js"></script>
  <script src="app.js"></script>
</body>
</html>
