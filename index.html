<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b0d10" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Habits" />
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="icon" href="icon.svg" type="image/svg+xml" />
  <link rel="apple-touch-icon" href="icon.svg" />
  <link rel="stylesheet" href="styles.css" />
  <title>Habits</title>
</head>
<body>
  <main id="app">
    <header class="topbar">
      <h1 id="page-title">Today</h1>
      <span id="date-label"></span>
    </header>

    <section id="view-today" class="view active"></section>
    <section id="view-history" class="view"></section>
    <section id="view-stats" class="view"></section>

    <button id="fab" aria-label="Add habit">+</button>

    <nav class="tabs">
      <button class="tab active" data-view="today"><span>✓</span>Today</button>
      <button class="tab" data-view="history"><span>▦</span>History</button>
      <button class="tab" data-view="stats"><span>↗</span>Stats</button>
    </nav>

    <div id="modal-root"></div>
    <div id="toast"></div>
  </main>

  <script src="config.js"></script>
  <script src="supabase.js"></script>
  <script src="app.js"></script>
</body>
</html>
